# ============================================================
# JUnit 5 Platform Configuration
# Task 4: Parallel Execution & Test Ordering
# ============================================================

# Enable parallel test execution
junit.jupiter.execution.parallel.enabled=true

# Run test methods in parallel (not just classes)
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Use fixed thread pool strategy with 4 threads
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=4

# Default test method ordering (can be overridden per class with @TestMethodOrder)
junit.jupiter.testmethod.order.default=org.junit.jupiter.api.MethodOrderer$OrderAnnotation
